model:
  weights: yolo11s-seg.pt
  target_layer_index: -3        # index into model.model.model; -3 = detection head backbone features

data:
  image_dir: IMAGES
  mask_dir: MASKS
  output_dir: PREDICTIONS

eigencam:
  top_k: 3                      # number of top eigenvectors used for projection
  blend_alpha: 0.4              # heatmap opacity when overlaid on original image

visualization:
  panel_gap_width: 20           # white gap (px) between panels in the 4-panel output
  metrics_header_height: 140    # height (px) of the metrics header panel above the images
  bottom_space: 60              # height (px) of the blank footer panel below the images
